# ABOUTME: Docker Compose stack for local WordPress theme development.
# ABOUTME: Mounts the theme directory for hot reload — save a file, refresh the page.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --require_secure_transport=OFF --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql

  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_DEBUG: "true"
    volumes:
      - wordpress-data:/var/www/html
      - ./theme:/var/www/html/wp-content/themes/wuerde-unantastbar
      - ./config/apache-rewrite.conf:/etc/apache2/conf-enabled/wordpress-rewrite.conf:ro
      - ./config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro

  wpcli:
    image: wordpress:cli
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
    volumes:
      - wordpress-data:/var/www/html
      - ./theme:/var/www/html/wp-content/themes/wuerde-unantastbar
      - ./config/client.cnf:/etc/my.cnf.d/client.cnf:ro
    # No restart policy — only runs on demand via `make wp` or `make install`

volumes:
  mysql-data:
  wordpress-data:
