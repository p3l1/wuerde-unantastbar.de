# ABOUTME: Synchronisiert die Version in theme/style.css mit dem release-please-Manifest.
# ABOUTME: Läuft auf release-please-Branches und committet die Version unabhängig von release-please.

name: Sync theme version

on:
  push:
    branches:
      - 'release-please--**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r '.["."]' .release-please-manifest.json)" >> $GITHUB_OUTPUT

      - name: Update theme/style.css
        run: |
          sed -i "s/^Version: .*/Version: ${{ steps.version.outputs.version }}/" theme/style.css

      - name: Commit if changed
        run: |
          git diff --quiet theme/style.css && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theme/style.css
          git commit -m "chore: sync theme version to ${{ steps.version.outputs.version }}"
          git push
